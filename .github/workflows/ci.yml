name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Flake check
        run: nix flake check --no-build

      - name: Build tatara-script
        run: nix build .#tatara-script -L

      - name: Smoke test tatara-script
        run: |
          echo '(print-line "hello from ci")' > /tmp/smoke.tlisp
          ./result/bin/tatara-script /tmp/smoke.tlisp
